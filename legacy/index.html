    <title>Fire Emblem: Three Houses</title>
    <script src="https://cdn.tailwindcss.com"></script>

        tailwind.config = {
            darkMode: 'class',
            theme: {
                borderRadius: {
                    'none': '0',
                    'sm': '2px',
                    DEFAULT: '3px',
                    'md': '3px',
                    'lg': '3px',
                    'xl': '3px',
                    '2xl': '3px',
                    '3xl': '3px',
                    'full': '9999px',
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-main: 'Noto Sans KR', sans-serif;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body, h1, h2, h3, h4, h5, h6, p, span, div, a, li, ul, ol, blockquote, pre, code, input, textarea, button, select, strong, b, em, i, u, s {
            font-family: var(--font-main) !important;
            font-style: normal !important;
        }

        .font-serif { font-family: var(--font-main) !important; }
        .italic, .em { font-style: normal !important; }
        em, i, cite, address, dfn, var { font-style: normal !important; }

        /* [PR #Markdown-Italic-Fix] Allow italics within markdown content */
        .prose-custom em, .prose-custom i, .prose-compact em, .prose-compact i {
            font-style: italic !important;
        }

        body { margin: 0; padding: 0; transition: background-color 0.2s ease, color 0.2s ease; }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        button:focus, input:focus, textarea:focus, select:focus, [role="button"]:focus {
            outline: none !important;
            box-shadow: none !important;
        }

        /* [PR #Mobile-Zoom-Fix] Prevent auto-zoom on iOS inputs by enforcing 16px font size */
        @media screen and (max-width: 768px) {
            input, textarea, select {
                font-size: 16px !important;
            }
            
            /* [PR #Mobile-Typography-Fix] Responsive font sizes for better density */
            .prose-custom p {
                font-size: 0.875rem !important;
                line-height: 1.65 !important;
            }
            .prose-compact p {
                font-size: 0.8125rem !important;
                line-height: 1.6 !important;
            }
            .prose-custom h1 {
                font-size: 1.125rem !important;
            }
            .prose-custom h2 {
                font-size: 1rem !important;
            }
            .prose-custom h3 {
                font-size: 0.9rem !important;
            }
            .prose-compact h1 {
                font-size: 1rem !important;
            }
            .prose-compact h2 {
                font-size: 0.9rem !important;
            }
            .prose-compact h3 {
                font-size: 0.85rem !important;
            }
        }

        /* [PR #Typography-Opt] Korean Readability & Balancing */
        .break-keep {
            word-break: keep-all !important;
            overflow-wrap: break-word !important;
        }

        .text-balance {
            text-wrap: balance !important;
        }

        /* [PR #1] Foundation of Motion - Core Animation Engine */
        @keyframes modal-enter {
            from { opacity: 0; transform: scale(0.98) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        @keyframes panel-slide-in {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes tab-content-in {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes backdrop-fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-fodlan-modal {
            animation: modal-enter 0.4s var(--ease-out-expo) forwards;
            will-change: transform, opacity;
        }

        .animate-fodlan-panel {
            animation: panel-slide-in 0.5s var(--ease-out-expo) forwards;
            will-change: transform, opacity;
        }

        .animate-fodlan-tab {
            animation: tab-content-in 0.35s ease-out forwards;
            will-change: transform, opacity;
        }

        .animate-fodlan-backdrop {
            animation: backdrop-fade 0.3s ease-out forwards;
        }

        /* [PR #2] Intellectual Echo - Shimmer Animation */
        @keyframes fodlan-shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .animate-fodlan-shimmer {
            position: relative;
            overflow: hidden;
        }
        
        .animate-fodlan-shimmer::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0,
                rgba(255, 255, 255, 0.2) 20%,
                rgba(255, 255, 255, 0.5) 60%,
                rgba(255, 255, 255, 0)
            );
            animation: fodlan-shimmer 2.5s infinite var(--ease-out-expo);
        }

        .dark .animate-fodlan-shimmer::after {
            background-image: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0,
                rgba(255, 255, 255, 0.05) 20%,
                rgba(255, 255, 255, 0.1) 60%,
                rgba(255, 255, 255, 0)
            );
        }

        /* [Phase 3] Pulse & Invert Animations */
        @keyframes pulse-blue-glow {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); border-color: rgba(59, 130, 246, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); border-color: rgba(59, 130, 246, 0.8); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); border-color: rgba(59, 130, 246, 0.5); }
        }
        .animate-pulse-blue {
            animation: pulse-blue-glow 2s infinite;
        }

        /* [PR #4] Operation Heartbeat - Visual Overlays */
        @keyframes temporal-vignette-pulse {
            0%, 100% { background: radial-gradient(circle, transparent 50%, rgba(139, 0, 0, 0.15) 100%); }
            50% { background: radial-gradient(circle, transparent 30%, rgba(139, 0, 0, 0.4) 100%); }
        }

        @keyframes enhanced-pulse-fx {
            0%, 100% { backdrop-filter: blur(0px) saturate(100%) contrast(100%); }
            50% { backdrop-filter: blur(4px) saturate(180%) contrast(110%); }
        }

        @keyframes purification-sweep-fx {
            0% { transform: translateX(-150%) skewX(-30deg); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateX(250%) skewX(-30deg); opacity: 0; }
        }

        .animate-temporal-distortion {
            animation: temporal-vignette-pulse 1.5s infinite ease-in-out;
            will-change: background;
        }

        .animate-enhanced-pulse {
            animation: enhanced-pulse-fx 0.4s var(--ease-out-expo) forwards;
            will-change: backdrop-filter;
        }

        .purification-shimmer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
            mix-blend-mode: color-dodge;
        }

        .purification-shimmer::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 40%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(59, 130, 246, 0.4) 50%,
                transparent 100%
            );
            animation: purification-sweep-fx 1.2s var(--ease-out-expo) forwards;
        }

        .prose-custom p { margin-bottom: 0.75rem; line-height: 1.8; font-size: 0.95rem; color: #1f2937; letter-spacing: -0.01em; word-break: keep-all; white-space: pre-wrap; }
        .dark .prose-custom p { color: #e5e7eb; }
        .prose-custom p:last-child { margin-bottom: 0; }
        .prose-custom strong { font-weight: 700; color: #111827; }
        .dark .prose-custom strong { color: #f9fafb; }
        .prose-custom blockquote { border-left: 3px solid #3b82f6; background: rgba(59, 130, 246, 0.05); padding: 0.5rem 1rem; margin: 1rem 0; color: #4b5563; border-radius: 0 4px 4px 0; }
        .dark .prose-custom blockquote { background: rgba(59, 130, 246, 0.1); color: #d1d5db; }
        .prose-custom ul, .prose-custom ol { margin: 0.5rem 0; padding-left: 0; list-style: none; }
        .prose-custom li { position: relative; padding-left: 1rem; margin-bottom: 0.25rem; line-height: 1.6; word-break: keep-all; }
        .prose-custom ul > li::before { content: ""; position: absolute; left: 0; top: 0.6em; width: 4px; height: 4px; background-color: #6b7280; border-radius: 1px; }
        .dark .prose-custom ul > li::before { background-color: #9ca3af; }
        .prose-custom h1, .prose-custom h2, .prose-custom h3 { font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1.3; color: #111827; word-break: keep-all; text-wrap: balance; }
        .dark .prose-custom h1, .dark .prose-custom h2, .dark .prose-custom h3 { color: #f3f4f6; }
        .prose-custom h1 { font-size: 1.25rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.25rem; }
        .dark .prose-custom h1 { border-bottom-color: #374151; }
        .prose-custom h2 { font-size: 1.1rem; }
        .prose-custom h3 { font-size: 1rem; color: #374151; }
        .dark .prose-custom h3 { color: #d1d5db; }
        .prose-custom > *:first-child { margin-top: 0 !important; }
        .prose-custom hr { border: 0; border-top: 1px solid #e5e7eb; margin: 1.5rem 0; }
        .dark .prose-custom hr { border-top-color: #4b5563; }
        .prose-custom sub { display: block; font-size: 0.75rem; color: #6b7280; margin-top: 0; margin-bottom: 0; }
        .dark .prose-custom sub { color: #9ca3af; }
        .prose-compact p { margin-bottom: 0.25rem; font-size: 0.9rem; line-height: 1.7; white-space: pre-wrap; }
        .prose-compact h1 { border-bottom: none !important; padding-bottom: 0 !important; margin-top: 1rem !important; font-size: 1.1rem !important; }
        .prose-compact h2 { font-size: 1rem !important; margin-top: 0.75rem !important; }
        .prose-compact h3 { font-size: 0.9rem !important; margin-top: 0.5rem !important; }
        .dark .prose-compact h1, .dark .prose-compact h2, .dark .prose-compact h3 { color: #d1d5db; }
        .prose-compact ul > li::before { background-color: #9ca3af; width: 3px; height: 3px; top: 0.75em; }
        .dark .prose-compact ul > li::before { background-color: #6b7280; }
        .prose-compact li { padding-left: 0.75rem; font-size: 0.9rem; margin-bottom: 0.125rem; }
        .prose-compact li > p { margin: 0 !important; display: inline; }
    </style>
